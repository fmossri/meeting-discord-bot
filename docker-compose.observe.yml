# Merge with docker-compose.dev.yml or docker-compose.prod.yml:
#   docker compose -f docker-compose.dev.yml -f docker-compose.observe.yml up
# Or: tsummix run dev --observe  (or -o)
#
# Adds Prometheus + Grafana and enables bot metrics (BOT_METRICS_*) for in-network scraping.

version: "3.9"

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  bot:
    environment:
      BOT_METRICS_PORT: "9091"
      BOT_METRICS_BIND: "0.0.0.0"
    expose:
      - "9091"
