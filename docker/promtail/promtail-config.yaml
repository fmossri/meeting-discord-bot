# Promtail: ship Docker container logs + rotated JSON files to Loki (M22.2).
# Requires access to the host Docker socket (see docker-compose.observe.yml).
#
# Decodes Docker’s JSON log wrapper; inner lines are stored as the log line.
# File job: rotated logs from services/logger (LOG_FILE_DIR) — no duplicate JSON if LOG_TO_STDOUT=false in Compose.
#
# Tsummix emits JSON lines — use LogQL in Grafana: `| json` or filter on `line` text.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Mounted volume in docker-compose.observe*.yml so read offsets survive container recreate.
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
    pipeline_stages:
      - docker: {}

  - job_name: tsummix-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: tsummix-files
          __path__: /var/log/tsummix/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            component: component
            event: event
